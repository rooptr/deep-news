<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Papers</title>
    <!-- Import a beautiful hand-drawn font -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #fdfdfd;
            font-family: 'Patrick Hand', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        h1 {
            font-size: 38px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 3px solid #111;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding-bottom: 5px;
        }
        
        .pizza-wrapper {
            position: relative;
            width: 300px;
            height: 400px;
            margin-top: 20px;
        }

        .slice-outline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
        }

        .toppings {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        a.topping {
            position: absolute;
            width: 76px;
            height: 76px;
            border: 3px solid #111;
            border-radius: 50% 40% 60% 45% / 45% 55% 40% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #111;
            font-size: 18px;
            line-height: 1.1;
            background-color: #fff;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.9);
        }
        
        .t-et { top: 85px; left: 60px; transform: rotate(-5deg); border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%; }
        .t-bs { top: 100px; left: 155px; transform: rotate(8deg); border-radius: 60% 40% 45% 55% / 40% 60% 45% 55%; }
        .t-fe { top: 175px; left: 100px; transform: rotate(-10deg); border-radius: 55% 45% 40% 60% / 60% 40% 55% 45%; }
        .t-mint { top: 265px; left: 112px; transform: rotate(4deg); border-radius: 45% 55% 60% 40% / 45% 55% 40% 60%; }

        a.topping:hover {
            background-color: #111;
            color: #fff;
            transform: scale(1.15) rotate(0deg);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.9);
            border-radius: 50%;
            z-index: 10;
        }

        /* --- WALKING ANIMATION CONTAINER --- */
        .animated-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .animated-walker {
            position: absolute;
            top: 0; left: 0;
            offset-path: path('M 15 45 Q 150 10 285 45');
            animation: crustWalk 12s linear infinite;
        }

        /* Forward movement and global fade */
        @keyframes crustWalk {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; } 
        }

        /* 16-Bit Baby Sprite Outline */
        .baby-sprite {
            filter: drop-shadow(2px 0 0 #111) drop-shadow(-2px 0 0 #111) drop-shadow(0 2px 0 #111) drop-shadow(0 -2px 0 #111);
            transform: translateY(-20px); /* Lift him so feet are on the crust */
            overflow: visible;
        }

        /* Smooth Limbs Animation for Retro Sprite */
        @keyframes swing-leg-r {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(30deg); }
        }
        @keyframes swing-leg-l {
            0%, 100% { transform: rotate(30deg); }
            50% { transform: rotate(-30deg); }
        }
        @keyframes swing-arm-r {
            0%, 100% { transform: rotate(30deg); }
            50% { transform: rotate(-30deg); }
        }
        @keyframes swing-arm-l {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(30deg); }
        }
        @keyframes bob-body {
            0%, 50%, 100% { transform: translateY(0); }
            25%, 75% { transform: translateY(-2px); }
        }

        .leg-front { animation: swing-leg-r 1s infinite ease-in-out; }
        .leg-back { animation: swing-leg-l 1s infinite ease-in-out; }
        .arm-front { animation: swing-arm-r 1s infinite ease-in-out; }
        .arm-back { animation: swing-arm-l 1s infinite ease-in-out; }
        .walker-group { animation: bob-body 1s infinite ease-in-out; }


        /* Speech Bubbles Stacked */
        .speech-container {
            position: absolute;
            top: -65px;
            left: 20px;
        }

        .bubble {
            position: absolute; /* Stack exactly on top of each other */
            top: 0; left: 0;
            font-family: 'Patrick Hand', cursive;
            font-size: 16px;
            font-weight: bold;
            color: #111;
            background: #fff;
            padding: 2px 10px;
            border: 2px solid #111;
            border-radius: 12px;
            opacity: 0;
            white-space: nowrap;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 10px;
            border-width: 6px 6px 0 0;
            border-style: solid;
            border-color: #111 transparent transparent transparent;
        }
        .bubble::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 11px;
            border-width: 4px 4px 0 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
            z-index: 1;
        }

        .b1 { animation: say1 12s infinite; }
        .b2 { animation: say2 12s infinite; }
        .b3 { animation: say3 12s infinite; color: #d32f2f; } /* Red for the final scream */

        /* Sequential pop up and disappear */
        @keyframes say1 {
            0%, 25% { opacity: 0; transform: scale(0.8); }
            28%, 38% { opacity: 1; transform: scale(1); }
            41%, 100% { opacity: 0; transform: scale(0.8); }
        }
        @keyframes say2 {
            0%, 41% { opacity: 0; transform: scale(0.8); }
            44%, 55% { opacity: 1; transform: scale(1); }
            58%, 100% { opacity: 0; transform: scale(0.8); }
        }
        @keyframes say3 {
            0%, 58% { opacity: 0; transform: scale(0.8); }
            61%, 72% { opacity: 1; transform: scale(1); }
            75%, 100% { opacity: 0; transform: scale(0.8); }
        }

    </style>
</head>
<body>
    <div class="container">
        <h1 id="date-header">Today's Edition</h1>
        
        <div class="pizza-wrapper">
            <!-- Sketchy Pizza SVG Outline -->
            <svg class="slice-outline" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                <path d="M 15 45 Q 150 10 285 45 Q 295 55 285 65 L 175 365 Q 150 390 125 365 L 15 65 Q 5 55 15 45 Z" fill="#fff" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 25 70 Q 150 35 275 70" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
                <path d="M 40 70 Q 45 80 40 90 M 260 70 Q 255 80 260 90 M 150 370 L 150 380 M 140 372 L 142 376 M 160 372 L 158 376 M 50 160 L 55 165 M 240 180 L 235 185 M 150 190 Q 155 200 150 210" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" />
            </svg>

            <!-- Toppings (Links) -->
            <div class="toppings">
                <a href="et.pdf" class="topping t-et">Eco<br>Times</a>
                <a href="bs.pdf" class="topping t-bs">Biz<br>Std</a>
                <a href="fe.pdf" class="topping t-fe">Fin<br>Exp</a>
                <a href="mint.pdf" class="topping t-mint">Mint</a>
            </div>

            <!-- Animated Container -->
            <div class="animated-container">
                <div class="animated-walker">
                    
                    <!-- Stacked Sequential Speech Bubbles -->
                    <div class="speech-container">
                        <div class="bubble b1">PIHHH</div>
                        <div class="bubble b2">PIHHH</div>
                        <div class="bubble b3">PIHHHHH!</div>
                    </div>

                    <!-- 16-Bit Style 2yo Baby Boy Walking (Smooth CSS Transforms) -->
                    <svg class="baby-sprite" viewBox="0 0 40 40" width="50" height="50" shape-rendering="crispEdges">
                        <g class="walker-group">
                            <!-- Arm Back -->
                            <g class="arm-back" style="transform-origin: 14px 19px;">
                                <path d="M12 19 h4 v6 h-4 z" fill="#dfaa77"/>
                            </g>
                            
                            <!-- Leg Back -->
                            <g class="leg-back" style="transform-origin: 16px 26px;">
                                <path d="M14 26 h4 v6 h-4 z" fill="#dfaa77"/>
                                <path d="M14 32 h6 v2 h-6 z" fill="#dfaa77"/> <!-- foot -->
                            </g>

                            <!-- Torso & Head -->
                            <g class="torso-head">
                                <!-- Hair -->
                                <path d="M14 4 h10 v4 h-10 z M12 6 h2 v4 h-2 z M24 6 h2 v2 h-2 z" fill="#654321"/>
                                <!-- Head -->
                                <path d="M14 8 h10 v10 h-10 z M24 10 h2 v6 h-2 z" fill="#ffcc99"/>
                                <!-- Eye -->
                                <path d="M21 10 h2 v2 h-2 z" fill="#000"/>
                                <!-- Diaper (White) -->
                                <path d="M14 18 h10 v8 h-10 z" fill="#fff"/>
                                <path d="M12 18 h2 v6 h-2 z M24 18 h2 v4 h-2 z" fill="#fff"/>
                                <!-- Diaper outline / shade -->
                                <path d="M14 26 h10 v2 h-10 z" fill="#ccc"/>
                            </g>
                            
                            <!-- Leg Front -->
                            <g class="leg-front" style="transform-origin: 19px 26px;">
                                <path d="M17 26 h4 v6 h-4 z" fill="#ffcc99"/>
                                <path d="M17 32 h6 v2 h-6 z" fill="#ffcc99"/> <!-- foot -->
                            </g>
                            
                            <!-- Arm Front -->
                            <g class="arm-front" style="transform-origin: 18px 19px;">
                                <path d="M16 19 h4 v6 h-4 z" fill="#ffcc99"/>
                            </g>
                        </g>
                    </svg>

                </div>
            </div>
        </div>
    </div>

    <script>
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('date-header').innerText = new Date().toLocaleDateString('en-US', options);
    </script>
</body>
</html>
