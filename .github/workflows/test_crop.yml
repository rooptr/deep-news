name: Test Image Crop

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  test-crop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install beautifulsoup4

      - name: Download Papers
        run: python fetch_papers.py

      - name: Crop Market Box using pdftocairo
        # Snipe just the market table:
        # Push Y down by 220px to skip the date/location header.
        # Push X right by 25px to skip the left margin.
        # Set Width to 320px to avoid the photo on the right.
        # Set Height to 250px to capture just the table and footnotes.
        run: pdftocairo -png -x 25 -y 220 -W 320 -H 250 bs.pdf market_box

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: market_box_crop
          path: market_box*.png
