name: Test Image Crop

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  test-crop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install beautifulsoup4

      - name: Download Papers
        run: python fetch_papers.py

      - name: Crop Market Box using pdftocairo
        # pdftocairo options:
        # -png : output png
        # -x 0 -y 0 : start at top left (0,0)
        # -W 600 -H 500 : crop to 600 pixels wide and 500 pixels tall
        # bs.pdf : input
        # market_box : output prefix
        run: pdftocairo -png -x 0 -y 0 -W 600 -H 500 bs.pdf market_box

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: market_box_crop
          path: market_box*.png
