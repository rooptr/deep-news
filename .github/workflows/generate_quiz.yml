name: Daily Quiz Generator

on:
  schedule:
    # 00:00 UTC is 05:30 AM IST (Runs well before the papers deploy at 9:00 AM IST)
    - cron: '15 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --disable-pip-version-check 'beautifulsoup4==4.13.4'

      - name: Generate Quiz
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quiz.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add quiz.json
          git commit -m "Auto-generate daily quiz questions" || exit 0
          git push
